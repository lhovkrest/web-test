<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Sensor Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .icon {
            font-size: 24px;
        }

        .card-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .card-unit {
            font-size: 14px;
            color: #999;
        }

        .timestamp {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid #fcc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            margin-left: 16px;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 Soil Sensor Monitor</h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="statusText">Loading...</span>
                <button onclick="fetchData()">Refresh</button>
            </div>
        </header>

        <div id="content">
            <div class="loading">Loading sensor data...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://txefsyatsedeeibzocdi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4ZWZzeWF0c2VkZWVpYnpvY2RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODIxMDYsImV4cCI6MjA5MTk1ODEwNn0.dEFdiF3RVZQRFdsqjW-p5rXMKCG_ZcgaoC_MhzCnNo0';
        const TABLE_NAME = 'sensor_readings';

        async function fetchData() {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=created_at.desc&limit=1`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to fetch data');

                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('content').innerHTML = 
                        '<div class="error">No sensor data found. Waiting for first reading...</div>';
                    document.getElementById('statusText').textContent = 'No data yet';
                    return;
                }

                const reading = data[0];
                displayData(reading);
                document.getElementById('statusText').textContent = 'Connected';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = 
                    `<div class="error">Error loading data: ${error.message}</div>`;
                document.getElementById('statusText').textContent = 'Connection error';
            }
        }

        function displayData(data) {
            const timestamp = data.created_at ? 
                new Date(data.created_at).toLocaleString() : 
                'Unknown';

            const html = `
                <div class="grid">
                    <div class="card">
                        <div class="card-header">
                            <span class="icon">💧</span>
                            <span class="card-title">Moisture</span>
                        </div>
                        <div class="card-value">${data.moisture || 0}</div>
                        <div class="card-unit">%</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🌡️</span>
                            <span class="card-title">Temperature</span>
                        </div>
                        <div class="card-value">${data.temperature || 0}</div>
                        <div class="card-unit">°C</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">⚡</span>
                            <span class="card-title">Conductivity</span>
                        </div>
                        <div class="card-value">${data.conductivity || 0}</div>
                        <div class="card-unit">µS/cm</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🧪</span>
                            <span class="card-title">pH Level</span>
                        </div>
                        <div class="card-value">${data.ph || 0}</div>
                        <div class="card-unit">pH</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🔵</span>
                            <span class="card-title">Nitrogen</span>
                        </div>
                        <div class="card-value">${data.nitrogen || 0}</div>
                        <div class="card-unit">mg/kg</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🟠</span>
                            <span class="card-title">Phosphorus</span>
                        </div>
                        <div class="card-value">${data.phosphorus || 0}</div>
                        <div class="card-unit">mg/kg</div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <span class="icon">🟡</span>
                            <span class="card-title">Potassium</span>
                        </div>
                        <div class="card-value">${data.potassium || 0}</div>
                        <div class="card-unit">mg/kg</div>
                    </div>
                </div>

                <div class="timestamp">
                    Last updated: ${timestamp}
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        // Initial load
        fetchData();

        // Auto-refresh every 30 seconds
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
